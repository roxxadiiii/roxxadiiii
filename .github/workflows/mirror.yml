name: Mirror to Codeberg and SourceHut

on:
  push:
    branches: ['**']
    tags: ['**']

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirrors
        run: |
          # Add remotes
          git remote add codeberg https://$CODEBERG_TOKEN@codeberg.org/roxxadiiii/roxxadiiii.git
          git remote add sourcehut https://$SOURCEHUT_TOKEN@git.sr.ht/roxxadiiii/roxxadiiii

          # Push everything (branches + tags)
          git push --mirror codeberg || echo "Codeberg failed"
          git push --mirror sourcehut || echo "SourceHut failed"
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          SOURCEHUT_TOKEN: ${{ secrets.SOURCEHUT_TOKEN }}
